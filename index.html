<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard do Robô</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="robot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                    <line x1="8" y1="16" x2="8" y2="16"></line>
                    <line x1="16" y1="16" x2="16" y2="16"></line>
                </svg>
            </div>
            <h1>B-Bot Control</h1>
            <button id="connectBtn" class="btn primary glowing-btn">
                <span>Conectar Bluetooth</span>
            </button>
            <div id="statusTxt" class="status-indicator">● Desconectado</div>
        </header>

        <main id="controlPanel" class="disabled">
            <div class="card glass-panel">
                <div class="card-header">
                    <h2>Sintonia PID</h2>
                    <button id="resetPidBtn" class="btn-icon" title="Zerar PID">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                </div>
                
                <div class="slider-group">
                    <label>Proporcional (P) <span id="valP">0</span></label>
                    <div class="slider-controls">
                        <button id="btnMinusP" class="btn-micro ripple">-</button>
                        <input type="range" id="sliderP" min="0" max="3000" value="0" step="0.1">
                        <button id="btnPlusP" class="btn-micro ripple">+</button>
                    </div>
                </div>
                <div class="slider-group">
                    <label>Integral (I) <span id="valI">0</span></label>
                    <div class="slider-controls">
                        <button id="btnMinusI" class="btn-micro ripple">-</button>
                        <input type="range" id="sliderI" min="0" max="1000" value="0" step="0.1">
                        <button id="btnPlusI" class="btn-micro ripple">+</button>
                    </div>
                </div>
                <div class="slider-group">
                    <label>Derivativo (D) <span id="valD">0.20</span></label>
                    <div class="slider-controls">
                        <button id="btnMinusD" class="btn-micro ripple">-</button>
                        <input type="range" id="sliderD" min="0" max="1000" value="0.20" step="0.01">
                        <button id="btnPlusD" class="btn-micro ripple">+</button>
                    </div>
                </div>
            </div>

            <div class="card glass-panel slider-card">
                <h2>Filtro Kalman</h2>
                <div class="slider-group">
                    <label>Q (Process Noise) <span id="valQ">0.001</span></label>
                    <div class="slider-controls">
                        <button id="btnMinusQ" class="btn-micro ripple">-</button>
                        <span id="displayQ" class="param-val">0.001</span>
                        <button id="btnPlusQ" class="btn-micro ripple">+</button>
                    </div>
                </div>
                <div class="slider-group">
                    <label>R (Sensor Noise) <span id="valR">0.300</span></label>
                    <div class="slider-controls">
                        <button id="btnMinusR" class="btn-micro ripple">-</button>
                        <span id="displayR" class="param-val">0.300</span>
                        <button id="btnPlusR" class="btn-micro ripple">+</button>
                    </div>
                </div>
            </div>



            <div class="card glass-panel angle-card">
                <h2>Ângulo Alvo (Offset)</h2>
                <div class="angle-control">
                    <button id="btnMinus" class="btn secondary angle-btn ripple">-</button>
                    <div class="angle-display">
                        <span id="angleVal" class="gradient-text">90.0</span><span class="degree">°</span>
                    </div>
                    <button id="btnPlus" class="btn secondary angle-btn ripple">+</button>
                </div>
                <div style="margin-top: 15px; font-size: 15px; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; display: flex; justify-content: center; align-items: center;">
                    Ângulo Atual: <span id="currentAngleDisplay" style="color: var(--secondary); font-weight: 700; font-size: 18px; margin-left: 8px;">--°</span>
                </div>
                <button id="calibrateBtn" class="btn secondary glowing-btn" style="margin-top: 15px; background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.4); color: #10b981;">
                    GRAVAR ÂNGULO ATUAL COMO ALVO
                </button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
